name: NixOS Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eval:
    name: Evaluate Configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Evaluate NixOS configuration
        run: |
          echo "Evaluating default..."
          nix eval .#nixosConfigurations.default.config.system.build.toplevel --raw > /dev/null
          echo "default: OK"

  vm-test:
    name: VM Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check KVM availability
        id: kvm
        run: |
          if [ -e /dev/kvm ] && [ -r /dev/kvm ] && [ -w /dev/kvm ]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "KVM is available"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "KVM is NOT available - VM tests will be skipped"
          fi

      - name: Run VM test
        if: steps.kvm.outputs.available == 'true'
        run: |
          nix build .#checks.x86_64-linux.vm-test --print-build-logs

      - name: Run Hyprland test
        if: steps.kvm.outputs.available == 'true'
        run: |
          nix build .#checks.x86_64-linux.hyprland-test --print-build-logs

      - name: Skip notice
        if: steps.kvm.outputs.available != 'true'
        run: |
          echo "::warning::VM tests skipped - KVM not available on this runner"
